<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mobile.css" media="screen and (max-width: 580px)">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comforter&family=Sriracha&display=swap');
    </style>
    <title>Grifou</title>
</head>

<body>
    <header>
        <h1>Grifou</h1>
        <span id="burguer" class="material-symbols-outlined" onclick="clickMenu()">menu</span>
        <nav id="itens">
            <a href="#">Home</a>
            <a href="#">Estoque</a>
            <a href="#">Parcerias</a>
            <a href="#">Sobre Nós</a>
            <a href="#">Contato</a>
        </nav>
    </header>
    <main>
        <section>
            <div class="destaques">
                <h2>Destaques do Mês</h2>
            </div>
        </section>

        <section>
            <div class="p1">
                Produto 1
            </div>
            <div class="p2">
                Produto 2
            </div>
            <div class="p3">
                Produto 3
            </div>
        </section>

        <section>
            <div class="p4">
                Produto 4
            </div>
            <div class="p5">
                Produto 5
            </div>
            <div class="p6">
                Produto 6
            </div>

        </section>

    </main>
    <script>
        function clickMenu() {
            let itens = document.getElementById('itens')

            if (itens.style.display == 'block') {
                itens.style.display = 'none'
            } else {
                itens.style.display = 'block'
            }
        }

        function mudouTamanho() {
            let itens = document.getElementById('itens')

            if (window.innerWidth >= 580) {
                itens.style.display = 'flex'
            } else {
                itens.style.display = 'none'
            }
        }

        window.onresize = mudouTamanho
    </script>
</body>

</html>
