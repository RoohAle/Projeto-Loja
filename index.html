<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mobile.css" media="screen and (max-width: 580px)">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comforter&family=Sriracha&display=swap');
    </style>
    <title>Grifou</title>
</head>

<body>
    <header>
        <h1>Grifou</h1>
        <span id="burguer" class="material-symbols-outlined" onclick="clickMenu()">menu</span>
        <nav id="itens">
            <a href="#">Home</a>
            <a href="#">Estoque</a>
            <a href="#">Parcerias</a>
            <a href="#">Sobre Nós</a>
            <a href="#">Contato</a>
        </nav>
    </header>
    <main>
        <section>
            <div class="destaques">
                <h2>Destaques do Mês</h2>
            </div>
        </section>

        <section id="section1">

            <div class="produto">
                <h3>Bolsa Prada</h3>
                <img src="img/Banner.png" alt="">
                <p class="preco">R$ 1.820,00</p>
            </div>

            <div class="produto">
                <h3>Bolsa Louis Vuitton</h3>
                <img src="img/Banner.png" alt="">
                <p class="preco">R$ 2.450,00</p>
            </div>
            <div class="produto">
                <h3>Bolsa Balenciaga</h3>
                <img src="img/Banner.png" alt="">
                <p class="preco">R$ 5.630,00</p>
            </div>
            <div class="produto">
                <h3>Bolsa Louis Vuitton</h3>
                <img src="img/Banner.png" alt="">
                <p class="preco">R$ 1.520,00</p>
            </div>
            <div class="produto">
                <h3>Bolsa Prada</h3>
                <img src="img/Banner.png" alt="">
                <p class="preco">R$ 2.150,00</p>
            </div>

            <div class="produto">
                <h3>Bolsa Balenciaga</h3>
                <img src="img/Banner.png" alt="">
                <p class="preco">R$ 8.130,00</p>
            </div>

        </section>

    </main>
    <script>
        function clickMenu() {
            let itens = document.getElementById('itens')

            if (itens.style.display == 'block') {
                itens.style.display = 'none'
            } else {
                itens.style.display = 'block'
            }
        }

        function mudouTamanho() {
            let itens = document.getElementById('itens')

            if (window.innerWidth >= 580) {
                itens.style.display = 'flex'
            } else {
                itens.style.display = 'none'
            }
        }

        window.onresize = mudouTamanho
    </script>
</body>

</html>
